<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask the Faculty — YPO × Stanford GSB 2026</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* ============ DESIGN SYSTEM (Mastercard-inspired) ============ */
    
    /* COLOR TOKENS (Tailwind mappable) */
    :root {
      /* Primary: Warm orange/red (Mastercard-inspired cardinal) */
      --color-primary-600: #E74C3C;     /* Warm cardinal red */
      --color-primary-700: #C0392B;     /* darker cardinal */
      --color-primary-500: #EC7063;     /* brighter cardinal (hover/active) */
      --color-primary-400: #F5B7B1;     /* lighter tint for accents */
      
      /* Neutrals: Warm cream/ivory canvas */
      --color-surface-bg: #FAF8F3;      /* warm cream background */
      --color-surface-card: #FFFFFF;    /* card background */
      --color-surface-soft: #F5F3F0;    /* soft accent bg */
      --color-border: #E8E4DC;          /* warm hairline borders */
      --color-text-primary: #2C2416;    /* warm charcoal text */
      --color-text-muted: #7A6F65;      /* warm muted text */
      --color-text-light: #A89E91;      /* lighter muted */
      
      /* Semantic */
      --color-success: #27AE60;
      --color-warning: #D68910;         /* warm amber caution */
      --color-error: #E74C3C;
      
      /* Special: Orbital accent line */
      --color-orbit: #E74C3C;           /* warm orange/red for orbital arcs */
      --color-user-bubble: #F5F3F0;     /* warm soft bg for user messages */
      
      /* Spacing (8pt system) */
      --space-0: 0;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      
      /* Border radius: Generous pills (Mastercard style) */
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --radius-pill: 9999px;
      
      /* Shadows: Soft, warm */
      --shadow-sm: 0 2px 4px rgba(44, 36, 22, 0.08);
      --shadow-md: 0 4px 12px rgba(44, 36, 22, 0.12);
      --shadow-lg: 0 12px 24px rgba(44, 36, 22, 0.15);
      
      /* Typography: Editorial warmth */
      --font-serif: 'Georgia', 'Garamond', serif;
      --font-sans: '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Helvetica Neue', sans-serif;
    }

    /* Type scale: Editorial, warm */
    :root {
      /* Mobile */
      --text-display: 32px / 1.15;
      --text-h1: 28px / 1.2;
      --text-h2: 24px / 1.35;
      --text-h3: 20px / 1.35;
      --text-body: 16px / 1.65;
      --text-small: 14px / 1.5;
      --text-caption: 12px / 1.45;
      
      @media (min-width: 1024px) {
        --text-display: 48px / 1.1;
        --text-h1: 40px / 1.2;
        --text-h2: 32px / 1.25;
        --text-h3: 24px / 1.35;
        --text-body: 18px / 1.65;
      }
    }

    /* ============ GLOBAL STYLES ============ */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-family: var(--font-sans);
      background: var(--color-surface-bg);
      color: var(--color-text-primary);
    }

    body {
      background: var(--color-surface-bg);
      margin: 0;
      overflow: hidden;
    }

    /* ============ LAYOUT ============ */
    .app-container {
      display: flex;
      height: 100vh;
      width: 100%;
      background: var(--color-surface-bg);
    }

    .viewport {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
    }

    .screen {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ============ MOBILE FRAME ============ */
    .frame-mobile {
      width: 390px;
      height: 844px;
      display: flex;
      flex-direction: column;
      background: var(--color-surface-bg);
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      position: relative;
    }

    .frame-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .frame-main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    .frame-tab-bar {
      height: 60px;
      border-top: 1px solid var(--color-border);
      background: var(--color-surface-card);
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    /* ============ DESKTOP FRAME ============ */
    .frame-desktop {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--color-surface-bg);
      overflow: hidden;
      position: relative;
    }

    /* ============ COMMON COMPONENTS ============ */

    /* Header */
    .app-header {
      background: var(--color-surface-card);
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      min-height: 56px;
    }

    .app-header-title {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 500;
      color: var(--color-text-primary);
      flex: 1;
    }

    .app-header-subtitle {
      font-size: 11px;
      color: var(--color-text-muted);
      margin-top: 2px;
    }

    /* ============ BRAND LOGO LOCKUP ============ */
    .brand-lockup {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: var(--color-surface-bg);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-mark svg { display: block; }

    .brand-text { display: flex; flex-direction: column; }

    .brand-wordmark {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 600;
      line-height: 1.1;
      color: var(--color-text-primary);
      letter-spacing: -0.3px;
    }

    .brand-cobrand {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-top: 3px;
      white-space: nowrap;
    }

    .brand-cobrand .brand-cross {
      color: var(--color-primary-600);
      font-weight: 700;
      margin: 0 1px;
    }

    /* Small mark for secondary screen headers */
    .brand-mark-sm {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      background: var(--color-surface-bg);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-back {
      background: none;
      border: none;
      color: var(--color-text-primary);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-back:hover {
      color: var(--color-primary-600);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      min-height: 44px;
      padding: var(--space-2) var(--space-4);
      letter-spacing: 0.3px;
    }

    .btn-primary {
      background: var(--color-primary-600);
      color: white;
    }

    .btn-primary:hover {
      background: var(--color-primary-700);
    }

    .btn-primary:active {
      background: var(--color-primary-500);
    }

    .btn-secondary {
      background: var(--color-surface-bg);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border);
    }

    .btn-secondary:hover {
      background: var(--color-surface-card);
    }

    .btn-text {
      background: none;
      color: var(--color-primary-600);
      border: none;
      padding: var(--space-2);
    }

    .btn-text:hover {
      color: var(--color-primary-700);
    }

    /* Chips: Generous pills with warm accents */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      border-radius: var(--radius-pill);
      padding: var(--space-2) var(--space-4);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid var(--color-border);
      background: var(--color-surface-card);
      color: var(--color-text-primary);
    }

    .chip:hover {
      border-color: var(--color-primary-500);
      background: var(--color-surface-soft);
      box-shadow: var(--shadow-sm);
    }

    .chip.active {
      background: var(--color-primary-600);
      color: white;
      border-color: var(--color-primary-600);
      box-shadow: 0 4px 12px rgba(231, 76, 60, 0.25);
    }

    /* Cards: Pill-shaped, warm shadows */
    .card {
      background: var(--color-surface-card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      padding: var(--space-4);
      box-shadow: var(--shadow-sm);
    }

    .card-hover {
      transition: all 0.2s ease;
    }

    .card-hover:hover {
      border-color: var(--color-primary-500);
      box-shadow: var(--shadow-md);
    }

    /* Disclaimer banner: Warm pill shape */
    .disclaimer-banner {
      background: #FEF6ED;
      border: 1px solid #F5D9B8;
      border-radius: var(--radius-md);
      padding: var(--space-3);
      font-size: 11px;
      line-height: 1.6;
      color: #8B6F47;
      margin: var(--space-4);
      margin-bottom: var(--space-3);
    }

    /* Chat bubble styles */
    .bubble-container {
      display: flex;
      gap: var(--space-2);
      margin: var(--space-3) 0;
      padding: 0 var(--space-4);
      align-items: flex-start;
    }

    .bubble-user {
      justify-content: flex-end;
    }

    .bubble-user .bubble-content {
      background: var(--color-user-bubble);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border);
    }

    .bubble-agent {
      justify-content: flex-start;
    }

    .bubble-agent .bubble-content {
      background: var(--color-surface-card);
      border: 2px solid var(--color-border);
      color: var(--color-text-primary);
      position: relative;
    }

    /* Subtle orbital accent on agent bubbles */
    .bubble-agent .bubble-content::before {
      content: '';
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--color-orbit);
      border-radius: 50%;
      top: -8px;
      left: 12px;
      opacity: 0.6;
    }

    .bubble-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .bubble-content {
      max-width: 280px;
      padding: var(--space-3);
      border-radius: var(--radius-lg);
      word-wrap: break-word;
      line-height: 1.6;
    }

    .bubble-content h2 {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 600;
      margin: var(--space-3) 0 var(--space-2);
      color: var(--color-text-primary);
      letter-spacing: -0.3px;
    }

    .bubble-content h3 {
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 600;
      margin: var(--space-2) 0 var(--space-1);
      color: var(--color-text-primary);
    }

    .bubble-content ul, .bubble-content ol {
      margin: var(--space-2) 0;
      padding-left: var(--space-4);
    }

    .bubble-content li {
      margin: var(--space-1) 0;
    }

    .bubble-content strong {
      font-weight: 600;
    }

    .bubble-content code {
      background: rgba(0, 0, 0, 0.05);
      padding: 2px 4px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }

    .bubble-content blockquote {
      border-left: 3px solid var(--color-border);
      padding-left: var(--space-3);
      margin: var(--space-2) 0;
      color: var(--color-text-muted);
      font-style: italic;
    }

    .bubble-content table {
      margin: var(--space-2) 0;
      font-size: 13px;
      border-collapse: collapse;
      width: 100%;
    }

    .bubble-content table th,
    .bubble-content table td {
      padding: var(--space-2);
      border-bottom: 1px solid var(--color-border);
      text-align: left;
    }

    .bubble-content table th {
      font-weight: 600;
      background: rgba(0, 0, 0, 0.02);
    }

    .bubble-metadata {
      font-size: 11px;
      color: var(--color-text-muted);
      margin-top: var(--space-1);
      margin-bottom: var(--space-2);
    }

    .bubble-actions {
      display: flex;
      gap: var(--space-2);
      margin-top: var(--space-2);
    }

    .btn-action {
      background: none;
      border: none;
      color: var(--color-text-muted);
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.15s ease;
    }

    .btn-action:hover {
      color: var(--color-primary-600);
      background: rgba(140, 21, 21, 0.05);
    }

    /* Input/Composer */
    .composer-box {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      padding: var(--space-4);
      background: var(--color-surface-card);
      border-top: 1px solid var(--color-border);
    }

    .input-field {
      width: 100%;
      padding: var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      font-family: var(--font-sans);
      font-size: 14px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      transition: all 0.2s ease;
      background: var(--color-surface-card);
    }

    .input-field:focus {
      outline: none;
      border-color: var(--color-primary-600);
      box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
    }

    .input-field::placeholder {
      color: var(--color-text-light);
    }

    /* Search field */
    .search-field {
      position: relative;
      margin: var(--space-4);
      margin-bottom: var(--space-2);
    }

    .search-input {
      width: 100%;
      padding: var(--space-3) var(--space-4) var(--space-3) var(--space-10);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-family: var(--font-sans);
      background: var(--color-surface-card);
      transition: all 0.2s ease;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--color-primary-600);
    }

    .search-icon {
      position: absolute;
      left: var(--space-3);
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-muted);
      pointer-events: none;
    }

    /* Faculty grid */
    .faculty-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-4);
      padding: var(--space-4);
      padding-top: 0;
    }

    @media (min-width: 430px) {
      .faculty-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .faculty-grid {
        grid-template-columns: repeat(3, 1fr);
        padding: var(--space-6);
        padding-top: 0;
      }
    }

    .faculty-card {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      padding: var(--space-4);
      background: var(--color-surface-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    /* Orbital accent on hover */
    .faculty-card::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--color-orbit);
      border-radius: 50%;
      top: -4px;
      right: 24px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .faculty-card:hover {
      border-color: var(--color-primary-500);
      box-shadow: var(--shadow-md);
    }

    .faculty-card:hover::after {
      opacity: 0.7;
    }

    .faculty-header {
      display: flex;
      gap: var(--space-3);
      align-items: flex-start;
    }

    .faculty-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .faculty-info {
      flex: 1;
    }

    .faculty-name {
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
      letter-spacing: -0.2px;
    }

    .faculty-session {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: 2px;
    }

    .faculty-domain {
      font-size: 13px;
      color: var(--color-text-muted);
      line-height: 1.4;
    }

    .faculty-cta {
      padding: var(--space-2) 0;
      text-align: center;
      border-top: 1px solid var(--color-border);
      margin-top: var(--space-2);
    }

    .faculty-cta button {
      width: 100%;
      padding: var(--space-2) var(--space-3);
    }

    /* Tab bar */
    .tab-item {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--color-text-muted);
      font-size: 11px;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .tab-item.active {
      color: var(--color-primary-600);
    }

    .tab-icon {
      font-size: 24px;
    }

    /* Welcome gate */
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      gap: var(--space-6);
      text-align: center;
    }

    .welcome-card {
      background: var(--color-surface-card);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      border: 1px solid var(--color-border);
      max-width: 340px;
    }

    .welcome-icon {
      font-size: 56px;
      margin-bottom: var(--space-4);
    }

    .welcome-title {
      font-family: var(--font-serif);
      font-size: 28px;
      font-weight: 600;
      margin-bottom: var(--space-3);
      color: var(--color-text-primary);
      letter-spacing: -0.3px;
    }

    .welcome-subtitle {
      font-size: 14px;
      color: var(--color-text-muted);
      line-height: 1.6;
      margin-bottom: var(--space-4);
    }

    .welcome-disclaimer {
      background: #FEF6ED;
      border: 1px solid #F5D9B8;
      border-radius: var(--radius-md);
      padding: var(--space-3);
      font-size: 11px;
      line-height: 1.6;
      color: #8B6F47;
      margin-bottom: var(--space-4);
      text-align: left;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      gap: var(--space-4);
      text-align: center;
    }

    .empty-headline {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 600;
      color: var(--color-text-primary);
      letter-spacing: -0.2px;
    }

    .empty-subtext {
      font-size: 14px;
      color: var(--color-text-muted);
      max-width: 280px;
    }

    .empty-chips {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      width: 100%;
      margin-top: var(--space-2);
    }

    .chip-large {
      padding: var(--space-3) var(--space-4);
      font-size: 13px;
      text-align: center;
      cursor: pointer;
    }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      height: 20px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-text-light);
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }

    /* Scroll region */
    .chat-scroll {
      flex: 1;
      overflow-y: auto;

    function MarkdownRenderer({ content }) {
      const lines = content.split('\n');
      const out = [];
      let listBuf = [];
      let tableBuf = [];
      const flushList = (k) => {
        if (listBuf.length) { out.push(<ul key={'ul' + k}>{listBuf}</ul>); listBuf = []; }
      };
      const flushTable = (k) => {
        if (!tableBuf.length) return;
        const rows = tableBuf.filter(r => !/^[-\s|:]+$/.test(r.join('')));
        const header = rows[0] || [];
        const body = rows.slice(1);
        out.push(
          <div key={'tbl' + k} style={{ overflowX: 'auto', margin: '8px 0' }}>
            <table>
              <thead><tr>{header.map((c, j) => <th key={j}>{formatInline(c)}</th>)}</tr></thead>
              <tbody>{body.map((r, ri) => <tr key={ri}>{r.map((c, j) => <td key={j}>{formatInline(c)}</td>)}</tr>)}</tbody>
            </table>
          </div>
        );
        tableBuf = [];
      };

      lines.forEach((line, i) => {
        const t = line.trim();
        if (t.startsWith('|')) {
          const cells = t.replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());
          tableBuf.push(cells);
          return;
        }
        flushTable(i);
        if (t.startsWith('## ')) { flushList(i); out.push(<h2 key={i}>{formatInline(t.slice(3))}</h2>); }
        else if (t.startsWith('### ')) { flushList(i); out.push(<h3 key={i}>{formatInline(t.slice(4))}</h3>); }
        else if (t.startsWith('- ')) { listBuf.push(<li key={i}>{formatInline(t.slice(2))}</li>); }
        else if (t === '') { flushList(i); }
        else { flushList(i); out.push(<p key={i} style={{ marginBottom: '8px' }}>{formatInline(t)}</p>); }
      });
      flushList('end');
      flushTable('end');
      return <div>{out}</div>;
    }

    /* Inline markdown: **bold** and *italic* */
    function formatInline(text) {
      const nodes = [];
      const regex = /(\*\*([^*]+)\*\*|\*([^*]+)\*)/g;
      let lastIndex = 0;
      let key = 0;
      let m;
      while ((m = regex.exec(text)) !== null) {
        if (m.index > lastIndex) nodes.push(text.slice(lastIndex, m.index));
        if (m[2] !== undefined) nodes.push(<strong key={key++}>{m[2]}</strong>);
        else if (m[3] !== undefined) nodes.push(<em key={key++}>{m[3]}</em>);
        lastIndex = regex.lastIndex;
      }
      if (lastIndex < text.length) nodes.push(text.slice(lastIndex));
      return nodes;
    }

    /* Block markdown: headings, lists, paragraphs (no tables) */
    function RichText({ content }) {
      const lines = content.split('\n');
      const out = [];
      let listBuf = [];
      const flush = (k) => {
        if (listBuf.length) { out.push(<ul key={'ul' + k}>{listBuf}</ul>); listBuf = []; }
      };
      lines.forEach((line, i) => {
        if (line.startsWith('## ')) { flush(i); out.push(<h2 key={i}>{formatInline(line.slice(3))}</h2>); }
        else if (line.startsWith('### ')) { flush(i); out.push(<h3 key={i}>{formatInline(line.slice(4))}</h3>); }
        else if (line.startsWith('- ')) { listBuf.push(<li key={i}>{formatInline(line.slice(2))}</li>); }
        else if (line.trim() === '') { flush(i); }
        else { flush(i); out.push(<p key={i}>{formatInline(line)}</p>); }
      });
      flush('end');
      return <div>{out}</div>;
    }

                    <div className="faculty-info">
                      <div className="faculty-name">{prof.name}</div>
                      <div className="faculty-session">{prof.session}</div>
                    </div>
                  </div>
                  <div className="faculty-domain">{prof.domain}</div>
                  <div className="faculty-cta">
                    <button className="btn btn-secondary" style={{ width: '100%', fontSize: '13px' }}>
                      Chat 1:1
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function ProfessorChatScreen({ professorId, onBack, isMobile }) {
      const prof = FACULTY.find(p => p.id === professorId);
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);

      const starterChips = [
        `What's the core insight from your session?`,
        'How do I apply this to my business?',
        'Can you elaborate on that framework?',
        'What are the most common pitfalls?'
      ];

      const handleSend = () => {
        if (!input.trim()) return;
        const newMessages = [
          ...messages,
          { role: 'user', text: input, professor: professorId }
        ];
        setMessages(newMessages);
        setInput('');
        setIsTyping(true);

        setTimeout(() => {
          newMessages.push({
            role: 'assistant',
            text: SAMPLE_RESPONSE,
            professor: professorId
          });
          setMessages([...newMessages]);
          setIsTyping(false);
        }, 2000);
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          {/* Header */}
          <div className="app-header">
            <button className="btn-back" onClick={onBack}>←</button>
            <div style={{ flex: 1 }}>
              <div className="app-header-title">{prof.name}</div>
              <div className="app-header-subtitle">{prof.session}</div>
            </div>
          </div>

          {prof.caution && (
            <div className="caution-line">
              <div className="caution-icon">⚠️</div>
              <div>Not individualized medical, legal, or investment advice.</div>
            </div>
          )}

          {/* Main chat area */}
          <div className="chat-scroll">
            {messages.length === 0 && (
              <div className="empty-state" style={{ paddingTop: '40px' }}>
                <div className="empty-headline">Chat with {prof.name.split(' ').pop()}</div>
                <p className="empty-subtext">
                  Ask about their session, frameworks, or how to apply their ideas.
                </p>
                <div className="empty-chips">
                  {starterChips.map((chip, i) => (
                    <button
                      key={i}
                      className="chip chip-large"
                      onClick={() => setInput(chip)}
                      style={{ background: 'white', border: '1px solid var(--color-border)' }}
                    >
                      {chip}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {messages.map((msg, i) => (
              <ChatBubble key={i} message={msg} />
            ))}
            {isTyping && (
              <div className="bubble-container bubble-agent">
                <div className="bubble-avatar" style={{ background: '#E7E5E1' }}>
                  {prof.emoji}
                </div>
                <div className="typing-dots">
                  <div className="typing-dot"></div>
                  <div className="typing-dot"></div>
                  <div className="typing-dot"></div>
                </div>
              </div>
            )}
          </div>

          {/* Composer */}
          <div className="composer-box">
            <textarea
              className="input-field"
              placeholder={`Ask ${prof.name.split(' ').pop()}...`}
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                  e.preventDefault();
                  handleSend();
                }
              }}
            />
            <button
              className="btn btn-primary"
              onClick={handleSend}
              disabled={!input.trim()}
              style={{ alignSelf: 'flex-end', minWidth: '100px' }}
            >
              Send
            </button>
          </div>
        </div>
      );
    }

    function ProgramScreen({ isMobile }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <div className="app-header">
            <div className="brand-mark-sm"><BrandMark size={22} /></div>
            <div>
              <div className="app-header-title">Program</div>
              <div className="app-header-subtitle">YPO × Stanford GSB 2026</div>
            </div>
          </div>

          <div style={{ flex: 1, overflowY: 'auto' }}>
            <div style={{ padding: 'var(--space-4)', background: 'var(--color-surface-card)', borderBottom: '1px solid var(--color-border)' }}>
              <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: '18px', fontWeight: 600, marginBottom: 'var(--space-2)' }}>
                Executive Education 2026
              </h2>
              <p style={{ fontSize: '14px', color: 'var(--color-text-muted)', lineHeight: 1.6 }}>
                A curated 4-day program with 17 world-class faculty and guest speakers covering AI, leadership, innovation, and strategy.
              </p>
            </div>

            <div className="program-list">
              {FACULTY.map((prof, i) => (
                <div key={prof.id} className="program-item">
                  <div className="program-number">Session {String(i + 1).padStart(2, '0')}</div>
                  <div className="program-name">{prof.name}</div>
                  <div className="program-meta">{prof.session}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ============ MAIN APP ============ */

    function App() {
      const [hasEntered, setHasEntered] = useState(false);
      const [activeTab, setActiveTab] = useState('ask');
      const [selectedProfessor, setSelectedProfessor] = useState(null);
      const [deviceMode, setDeviceMode] = useState('mobile'); // 'mobile' or 'desktop'

      const isMobile = deviceMode === 'mobile';

      const handleSelectProfessor = (profId) => {
        setSelectedProfessor(profId);
        setActiveTab('ask');
      };

      const handleBackFromProfessor = () => {
        setSelectedProfessor(null);
      };

      if (!hasEntered) {
        return (
          <div style={{ width: '100%', height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--color-surface-bg)' }}>
            <WelcomeScreen onEnter={() => setHasEntered(true)} isMobile={isMobile} />
          </div>
        );
      }

      const screenContent = selectedProfessor ? (
        <ProfessorChatScreen
          professorId={selectedProfessor}
          onBack={handleBackFromProfessor}
          isMobile={isMobile}
        />
      ) : (
        <>
          {activeTab === 'ask' && <AskScreen isMobile={isMobile} />}
          {activeTab === 'faculty' && <FacultyScreen onSelectProfessor={handleSelectProfessor} isMobile={isMobile} />}
          {activeTab === 'program' && <ProgramScreen isMobile={isMobile} />}
        </>
      );

      if (isMobile) {
        return (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', background: '#f0f0f0', padding: 'var(--space-4)' }}>
            <div style={{ position: 'relative' }}>
              <div className="device-selector">
                <button className={`device-btn ${deviceMode === 'mobile' ? 'active' : ''}`} onClick={() => setDeviceMode('mobile')}>
                  Mobile 390px
                </button>
                <button className={`device-btn ${deviceMode === 'desktop' ? 'active' : ''}`} onClick={() => setDeviceMode('desktop')}>
                  Desktop
                </button>
              </div>
              <MobileFrame>
                <div className="frame-content">
                  {screenContent}
                </div>
                {!selectedProfessor && <TabBar activeTab={activeTab} onTabChange={setActiveTab} />}
              </MobileFrame>
            </div>
          </div>
        );
      } else {
        return (
          <div style={{ width: '100%', height: '100vh', display: 'flex', flexDirection: 'column' }}>
            <div style={{ position: 'fixed', top: 'var(--space-4)', left: 'var(--space-4)', zIndex: 1000 }}>
              <button className={`device-btn ${deviceMode === 'mobile' ? 'active' : ''}`} onClick={() => setDeviceMode('mobile')} style={{ marginRight: 'var(--space-2)' }}>
                Mobile 390px
              </button>
              <button className={`device-btn ${deviceMode === 'desktop' ? 'active' : ''}`} onClick={() => setDeviceMode('desktop')}>
                Desktop
              </button>
            </div>
            <DesktopFrame>
              <div style={{ display: 'flex', flexDirection: 'column', height: '100%', paddingTop: '60px' }}>
                {screenContent}
              </div>
            </DesktopFrame>
          </div>
        );
      }
    }

    // Render app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
